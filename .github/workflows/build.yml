---
name: Build ZMK firmware
on: [push, workflow_dispatch]

jobs:
  matrix:
    runs-on: ubuntu-latest
    name: Fetch Build Matrix
    outputs:
      build_matrix: ${{ env.build_matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: fetch
        run: |
          matrix_content=$(yq -oj -I0 'zmk/corne/build.yaml')
          echo "build_matrix=$matrix_content" >> $GITHUB_ENV

  build:
    runs-on: ubuntu-latest
    needs: matrix
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.build_matrix) }}
    name: Build ${{ matrix.board }} ${{ matrix.shield }}
    steps:
      - uses: actions/checkout@v5

      - name: Create build directory
        run: echo "build_dir=$(mktemp -d)" >> $GITHUB_ENV

      - name: Prepare variables
        shell: bash
        env:
          board: ${{ matrix.board }}
          shield: ${{ matrix.shield }}
          snippet: ${{ matrix.snippet }}
        run: |
          if [ -n "${snippet}" ]; then
            extra_west_args="-S \"${snippet}\""
          fi
          echo "extra_west_args=${extra_west_args}" >> $GITHUB_ENV
          echo "extra_cmake_args=${shield:+-DSHIELD=\"$shield\"}" >> $GITHUB_ENV
          echo "display_name=${shield:+$shield - }${board}" >> $GITHUB_ENV
          artifact_name="${{ matrix.artifact-name }}"
          if [ -z "$artifact_name" ]; then
            artifact_name="${shield:+$shield-}${board//\//_}-zmk"
          fi
          echo "artifact_name=$artifact_name" >> $GITHUB_ENV

      - name: Cache west modules
        uses: actions/cache@v5.0.4
        continue-on-error: true
        with:
          path: |
            zmk/modules/
            zmk/tools/
            zmk/zephyr/
            zmk/bootloader/
            zmk/zmk/
          key: ${{ runner.os }}-zmk-modules-${{ hashFiles('zmk/corne/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-modules-

      - name: West Init
        run: west init -l "$GITHUB_WORKSPACE/zmk/corne"

      - name: West Update
        working-directory: zmk
        run: west update --fetch-opt=--filter=tree:0

      - name: Patch nice-view-gem overlay for Zephyr 4.1
        working-directory: zmk
        run: |
          python3 - <<'PY'
          from pathlib import Path

          overlay = Path("nice-view-gem/boards/shields/nice_view_gem/nice_view_gem.overlay")
          text = overlay.read_text()

          patch = '''&pinctrl {
              spi0_default: spi0_default {
                  group1 {
                      psels = <NRF_PSEL(SPIM_SCK, 0, 20)>,
                          <NRF_PSEL(SPIM_MOSI, 0, 17)>,
                          <NRF_PSEL(SPIM_MISO, 0, 25)>;
                  };
              };

              spi0_sleep: spi0_sleep {
                  group1 {
                      psels = <NRF_PSEL(SPIM_SCK, 0, 20)>,
                          <NRF_PSEL(SPIM_MOSI, 0, 17)>,
                          <NRF_PSEL(SPIM_MISO, 0, 25)>;
                      low-power-enable;
                  };
              };
          };

          nice_view_spi: &spi0 {
              compatible = "nordic,nrf-spim";
              pinctrl-0 = <&spi0_default>;
              pinctrl-1 = <&spi0_sleep>;
              pinctrl-names = "default", "sleep";
              cs-gpios = <&pro_micro 1 GPIO_ACTIVE_HIGH>;
          };

          &pro_micro_i2c {
              status = "disabled";
          };

          &oled {
              status = "disabled";
          };

          '''

          if "nice_view_spi: &spi0" not in text:
              overlay.write_text(patch + text)
          PY

      - name: West Zephyr export
        working-directory: zmk
        run: west zephyr-export

      - name: West Build (${{ env.display_name }})
        working-directory: zmk
        run: west build -s zmk/app -d "$build_dir" -b "${{ matrix.board }}" ${{ env.extra_west_args }} -- -DZMK_CONFIG=$GITHUB_WORKSPACE/zmk/corne ${{ env.extra_cmake_args }} ${{ matrix.cmake-args }}

      - name: Rename artifacts
        if: always()
        run: |
          if [ -f "$build_dir/zephyr/zmk.uf2" ]; then
            cp "$build_dir/zephyr/zmk.uf2" "$artifact_name.uf2"
          elif [ -f "$build_dir/zephyr/zmk.hex" ]; then
            cp "$build_dir/zephyr/zmk.hex" "$artifact_name.hex"
          else
            cp "$build_dir/zephyr/zmk.bin" "$artifact_name.bin" 2>/dev/null || true
          fi

      - name: Archive (${{ env.display_name }})
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: ${{ env.artifact_name }}
          path: |
            ${{ env.artifact_name }}.*

  merge:
    runs-on: ubuntu-latest
    needs: build
    name: Merge Output Artifacts
    steps:
      - uses: actions/download-artifact@v8.0.0
        with:
          path: firmware
          merge-multiple: true
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: firmware
          path: firmware
