---
name: Build ZMK firmware

on:
  workflow_dispatch:
  push:
    paths:
      - "zmk/**"
      - ".github/workflows/build.yml"
      - ".github/workflows/draw-keymap.yml"
      - "assets/keymaps/keymap_drawer.config.yaml"
      - ".github/scripts/select_keyboards.py"

jobs:
  select:
    runs-on: ubuntu-latest
    name: Select impacted keyboards
    outputs:
      build_matrix: ${{ steps.select.outputs.build_matrix }}
      selected_keyboards_json: ${{ steps.select.outputs.selected_keyboards_json }}
      should_run: ${{ steps.select.outputs.should_run }}
      reason: ${{ steps.select.outputs.reason }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: select
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 .github/scripts/select_keyboards.py --all-keyboards --github-output "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          args=()

          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] || continue
              for field in $line; do
                case "$field" in
                  A|M|D|T|U|X|B|R*|C*) ;;
                  *) args+=(--changed-file "$field") ;;
                esac
              done
            done < <(git diff-tree --name-status -r "$head_sha")
          else
            while IFS= read -r line; do
              [ -n "$line" ] || continue
              for field in $line; do
                case "$field" in
                  A|M|D|T|U|X|B|R*|C*) ;;
                  *) args+=(--changed-file "$field") ;;
                esac
              done
            done < <(git diff --name-status -M "$before_sha" "$head_sha")
          fi

          python3 .github/scripts/select_keyboards.py "${args[@]}" --github-output "$GITHUB_OUTPUT"

      - name: Selection summary
        run: |
          echo "Reason: ${{ steps.select.outputs.reason }}"
          echo "Selected keyboards: ${{ steps.select.outputs.selected_keyboards_json }}"

  build:
    runs-on: ubuntu-latest
    needs: select
    if: needs.select.outputs.should_run == 'true'
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.build_matrix) }}
    name: Build ${{ matrix.keyboard }} · ${{ matrix.board }} ${{ matrix.shield }}
    steps:
      - uses: actions/checkout@v5

      - name: Create build directory
        run: echo "build_dir=$(mktemp -d)" >> $GITHUB_ENV

      - name: Prepare variables
        shell: bash
        env:
          keyboard: ${{ matrix.keyboard }}
          board: ${{ matrix.board }}
          shield: ${{ matrix.shield }}
          snippet: ${{ matrix.snippet }}
        run: |
          if [ -n "${snippet}" ]; then
            extra_west_args="-S \"${snippet}\""
          fi
          echo "extra_west_args=${extra_west_args}" >> $GITHUB_ENV
          echo "extra_cmake_args=${shield:+-DSHIELD=\"$shield\"}" >> $GITHUB_ENV
          echo "display_name=${keyboard}: ${shield:+$shield - }${board}" >> $GITHUB_ENV
          artifact_name="${{ matrix.artifact-name }}"
          if [ -z "$artifact_name" ]; then
            artifact_name="${keyboard}-${shield:+$shield-}${board//\//_}-zmk"
          fi
          echo "artifact_name=$artifact_name" >> $GITHUB_ENV

      - name: Cache west modules
        uses: actions/cache@v5.0.4
        continue-on-error: true
        with:
          path: |
            zmk/modules/
            zmk/tools/
            zmk/zephyr/
            zmk/bootloader/
            zmk/zmk/
            zmk/nice-view-gem/
            zmk/zmk-helpers/
          key: ${{ runner.os }}-zmk-modules-${{ matrix.keyboard }}-${{ hashFiles(format('zmk/{0}/west.yml', matrix.keyboard)) }}
          restore-keys: |
            ${{ runner.os }}-zmk-modules-

      - name: West Init
        run: west init -l "$GITHUB_WORKSPACE/zmk/${{ matrix.keyboard }}"

      - name: West Update
        working-directory: zmk
        run: west update --fetch-opt=--filter=tree:0

      - name: Patch nice-view-gem overlay for Zephyr 4.1
        working-directory: zmk
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          overlay = Path("nice-view-gem/boards/shields/nice_view_gem/nice_view_gem.overlay")
          output = Path("nice-view-gem/boards/shields/nice_view_gem/widgets/output.c")
          if not overlay.exists():
              raise SystemExit(0)
          text = overlay.read_text()

          patch = '''&pinctrl {
              spi0_default: spi0_default {
                  group1 {
                      psels = <NRF_PSEL(SPIM_SCK, 0, 20)>,
                          <NRF_PSEL(SPIM_MOSI, 0, 17)>,
                          <NRF_PSEL(SPIM_MISO, 0, 25)>;
                  };
              };

              spi0_sleep: spi0_sleep {
                  group1 {
                      psels = <NRF_PSEL(SPIM_SCK, 0, 20)>,
                          <NRF_PSEL(SPIM_MOSI, 0, 17)>,
                          <NRF_PSEL(SPIM_MISO, 0, 25)>;
                      low-power-enable;
                  };
              };
          };

          nice_view_spi: &spi0 {
              compatible = "nordic,nrf-spim";
              pinctrl-0 = <&spi0_default>;
              pinctrl-1 = <&spi0_sleep>;
              pinctrl-names = "default", "sleep";
              cs-gpios = <&pro_micro 1 GPIO_ACTIVE_HIGH>;
          };

          &pro_micro_i2c {
              status = "disabled";
          };

          &oled {
              status = "disabled";
          };

          '''

          if "nice_view_spi: &spi0" not in text:
              overlay.write_text(patch + text)

          if output.exists():
              output_text = output.read_text()
              old = dedent('''
                  switch (state->selected_endpoint.transport) {
                  case ZMK_TRANSPORT_USB:
                      draw_usb_connected(canvas);
                      break;

                  case ZMK_TRANSPORT_BLE:
                      if (state->active_profile_bonded) {
                          if (state->active_profile_connected) {
                              draw_ble_connected(canvas);
                          } else {
                              draw_ble_disconnected(canvas);
                          }
                      } else {
                          draw_ble_unbonded(canvas);
                      }
                      break;
                  }
              ''').lstrip('\n')
              new = dedent('''
                  switch (state->selected_endpoint.transport) {
                  case ZMK_TRANSPORT_USB:
                      draw_usb_connected(canvas);
                      break;

                  case ZMK_TRANSPORT_NONE:
                  case ZMK_TRANSPORT_BLE:
                      if (state->active_profile_bonded) {
                          if (state->active_profile_connected) {
                              draw_ble_connected(canvas);
                          } else {
                              draw_ble_disconnected(canvas);
                          }
                      } else {
                          draw_ble_unbonded(canvas);
                      }
                      break;
                  }
              ''').lstrip('\n')
              if old in output_text:
                  output.write_text(output_text.replace(old, new))
          PY

      - name: West Zephyr export
        working-directory: zmk
        run: west zephyr-export

      - name: West Build (${{ env.display_name }})
        working-directory: zmk
        run: west build -s zmk/app -d "$build_dir" -b "${{ matrix.board }}" ${{ env.extra_west_args }} -- -DZMK_CONFIG=$GITHUB_WORKSPACE/zmk/${{ matrix.keyboard }} ${{ env.extra_cmake_args }} ${{ matrix.cmake-args }}

      - name: Rename artifacts
        if: always()
        run: |
          if [ -f "$build_dir/zephyr/zmk.uf2" ]; then
            cp "$build_dir/zephyr/zmk.uf2" "$artifact_name.uf2"
          elif [ -f "$build_dir/zephyr/zmk.hex" ]; then
            cp "$build_dir/zephyr/zmk.hex" "$artifact_name.hex"
          else
            cp "$build_dir/zephyr/zmk.bin" "$artifact_name.bin" 2>/dev/null || true
          fi

      - name: Archive (${{ env.display_name }})
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: ${{ env.artifact_name }}
          path: |
            ${{ env.artifact_name }}.*

  merge:
    runs-on: ubuntu-latest
    needs: [select, build]
    if: needs.select.outputs.should_run == 'true'
    name: Merge Output Artifacts
    steps:
      - uses: actions/download-artifact@v8.0.0
        with:
          path: firmware
          merge-multiple: true
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: firmware
          path: firmware

  noop:
    runs-on: ubuntu-latest
    needs: select
    if: needs.select.outputs.should_run != 'true'
    name: No affected keyboards
    steps:
      - run: |
          echo "No keyboard builds required."
          echo "Reason: ${{ needs.select.outputs.reason }}"
